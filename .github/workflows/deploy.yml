name: Deploy Mailcow

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.override.yml"
      - "docker-compose.yml"
      - "Makefile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-mailcow
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml, sys

          files = ['docker-compose.override.yml']
          failed = False
          for f in files:
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'  OK: {f}')
              except Exception as e:
                  print(f'  FAIL: {f}: {e}')
                  failed = True

          if failed:
              sys.exit(1)
          "

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/mailcow
            make deploy
